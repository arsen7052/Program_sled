<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Добавить запрещённое</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 500px;
      margin: 20px auto;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      font-size: 1.6em;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #2c3e50;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1em;
      box-sizing: border-box;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .radio-option {
      display: flex;
      align-items: center;
    }

    .radio-option input {
      margin-right: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #2ecc71;
      color: white;
      font-size: 1.1em;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #27ae60;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #3498db;
      text-decoration: none;
      font-size: 0.95em;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>➕ Добавить запрещённое</h1>
    <form action="/add-block/{{ filter_id }}" method="POST">
      <div class="form-group">
        <label for="name">Название приложения или сайта</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          placeholder="Например: tiktok.com или Telegram" 
          required 
        />
      </div>

      <div class="form-group">
        <label>Тип</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="type" value="app" required> Приложение
          </label>
          <label class="radio-option">
            <input type="radio" name="type" value="website"> Сайт
          </label>
        </div>
      </div>

      <button type="submit">Добавить в список</button>
    </form>

    <a href="/protiv/{{ filter_id }}" class="back-link">← Вернуться к списку</a>
  </div>
</body>
</html>
