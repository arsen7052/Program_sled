<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Добавить группу</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3a86ff;
      --primary-dark: #2573a6;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --bg: #f8fafd;
      --card-bg: #ffffff;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 8px 20px rgba(0, 0, 0, 0.12);
      --border-radius: 12px;
      --transition: all 0.3s ease;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background-color: var(--bg);
      margin: 0;
      padding: 20px;
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 30px;
      background-color: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
    }

    h1 {
      font-size: 1.8em;
      color: var(--text);
      margin: 0 0 20px 0;
      font-weight: 600;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text);
    }

    input[type="text"],
    input[type="number"],
    select,
    input[type="time"] {
      width: 80%;
      padding: 12px 16px;
      font-size: 1em;
      border: 1px solid #ddd;
      border-radius: 8px;
      background-color: #f9f9f9;
      transition: var(--transition);
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus,
    input[type="time"]:focus {
      outline: none;
      border-color: var(--primary);
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.1);
    }

    .btn {
      padding: 12px 24px;
      font-size: 1em;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      text-align: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .btn-secondary {
      background-color: #f1f5f9;
      color: var(--text);
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background-color: #e2e8f0;
    }

    .btn-outline {
      background-color: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .btn-outline:hover {
      background-color: rgba(58, 134, 255, 0.1);
    }

    .required {
      color: #e74c3c;
      font-weight: 600;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: var(--text-light);
      font-size: 0.95em;
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--primary);
    }

    /* Стили для списка расписания */
    .schedule-list {
      margin-top: 20px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .schedule-item {
      padding: 12px 16px;
      background-color: #f9f9f9;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .schedule-item:last-child {
      border-bottom: none;
    }

    .schedule-item span {
      font-size: 0.95em;
      color: var(--text);
    }

    .delete-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.85em;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #c0392b;
    }

    .add-schedule-btn {
      width: 100%;
      margin-bottom: 20px;
    }

    .schedule-form {
      background-color: #f9f9f9;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #eee;
      margin-bottom: 20px;
      display: none;
    }

    .schedule-form.active {
      display: block;
    }

    /* Улучшенная раскладка полей */
    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .form-row .form-col {
      flex: 1 1 200px;
      min-width: 140px;
    }

    .form-row .form-col.half {
      flex: 1 1 140px;
    }

    .time-label {
      font-size: 0.8em;
      color: var(--text-light);
      margin-bottom: 4px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>➕ Добавить новую группу</h1>

    <form action="/add-group" method="POST" id="groupForm">
      <div class="form-group">
        <label for="group-name">Название группы <span class="required">*</span></label>
        <input 
          type="text" 
          id="group-name" 
          name="group_name" 
          placeholder="Например: 10А" 
          required 
        />
      </div>

      <!-- Кнопка добавления дня -->
      <button type="button" class="btn btn-outline add-schedule-btn" id="addDayBtn">
        ➕ Добавить день в расписание
      </button>

      <!-- Форма добавления дня (скрыта по умолчанию) -->
      <div class="schedule-form" id="scheduleForm">
        <div class="form-row">
          <div class="form-col half">
            <label for="day">День недели</label>
            <select id="day" name="day">
              <option value="">Выберите день</option>
              <option value="Понедельник">Понедельник</option>
              <option value="Вторник">Вторник</option>
              <option value="Среда">Среда</option>
              <option value="Четверг">Четверг</option>
              <option value="Пятница">Пятница</option>
              <option value="Суббота">Суббота</option>
              <option value="Воскресенье">Воскресенье</option>
            </select>
          </div>

          <div class="form-col">
            <label class="time-label">С</label>
            <input type="time" id="start-time" name="start-time" />
          </div>

          <div class="form-col">
            <label class="time-label">По</label>
            <input type="time" id="end-time" name="end-time" />
          </div>
        </div>

        <div style="margin-top: 16px; text-align: right;">
          <button type="button" class="btn btn-secondary" id="cancelDayBtn">Отмена</button>
          <button type="button" class="btn btn-primary" id="saveDayBtn">Добавить</button>
        </div>
      </div>

      <!-- Список добавленных дней -->
      <div class="schedule-list" id="scheduleList">
        <div id="schedule-items"></div>
      </div>

      <!-- Скрытое поле для отправки расписания -->
      <input type="hidden" name="schedule" id="scheduleInput" />

      <div class="form-footer">
        <a href="/" class="btn btn-secondary">← Отмена</a>
        <button type="submit" class="btn btn-primary">Сохранить группу</button>
      </div>
    </form>

    <a href="/groups" class="back-link">← Вернуться к списку групп</a>
  </div>

  <script>
    // Массив для хранения расписания
    let schedule = [];

    const addDayBtn = document.getElementById('addDayBtn');
    const scheduleForm = document.getElementById('scheduleForm');
    const saveDayBtn = document.getElementById('saveDayBtn');
    const cancelDayBtn = document.getElementById('cancelDayBtn');
    const scheduleItems = document.getElementById('schedule-items');
    const scheduleInput = document.getElementById('scheduleInput');
    const groupForm = document.getElementById('groupForm');

    // Показать форму добавления дня
    addDayBtn.addEventListener('click', () => {
      scheduleForm.classList.add('active');
    });

    // Отмена добавления дня
    cancelDayBtn.addEventListener('click', () => {
      scheduleForm.classList.remove('active');
      document.getElementById('day').value = '';
      document.getElementById('start-time').value = '';
      document.getElementById('end-time').value = '';
    });

    // Добавить день в список
    saveDayBtn.addEventListener('click', () => {
      const day = document.getElementById('day').value;
      const start = document.getElementById('start-time').value;
      const end = document.getElementById('end-time').value;

      if (!day) {
        alert('Выберите день недели!');
        return;
      }
      if (!start) {
        alert('Укажите время начала!');
        return;
      }
      if (!end) {
        alert('Укажите время окончания!');
        return;
      }
      if (start >= end) {
        alert('Время окончания должно быть позже времени начала!');
        return;
      }

      const item = {
        day,
        start,
        end
      };

      schedule.push(item);
      updateScheduleList();
      updateHiddenInput();

      // Сброс формы
      cancelDayBtn.click();
    });

    // Обновить отображение списка
    function updateScheduleList() {
      scheduleItems.innerHTML = '';
      if (schedule.length === 0) {
        scheduleItems.innerHTML = '<div style="color: #7f8c8d; padding: 15px; text-align: center;">Расписание пустое</div>';
        return;
      }

      schedule.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'schedule-item';
        div.innerHTML = `
          <span><strong>${item.day}</strong>: с ${item.start} по ${item.end}</span>
          <button type="button" class="delete-btn" data-index="${index}">✕</button>
        `;
        scheduleItems.appendChild(div);
      });

      // Добавляем обработчики удаления
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const index = e.target.dataset.index;
          schedule.splice(index, 1);
          updateScheduleList();
          updateHiddenInput();
        });
      });
    }

    // Обновить скрытое поле
    function updateHiddenInput() {
      try {
        scheduleInput.value = JSON.stringify(schedule);
      } catch (e) {
        console.error('Ошибка сериализации расписания:', e);
        scheduleInput.value = '[]';
      }
    }

    // Проверка перед отправкой формы
    groupForm.addEventListener('submit', (e) => {
      updateHiddenInput(); // Синхронизируем

      // Если расписание пустое — предупреждаем
      if (schedule.length === 0) {
        e.preventDefault();
        alert('Добавьте хотя бы один день в расписание!');
        addDayBtn.click(); // Открываем форму
      }
    });

    // Инициализация
    updateScheduleList();
    updateHiddenInput();
  </script>
</body>
</html>
