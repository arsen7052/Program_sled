<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Добавить запись</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      line-height: 1.6;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 24px;
      font-weight: 500;
      margin: 0;
    }

    .form-container {
      padding: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #2c3e50;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 30px;
    }

    .btn {
      flex: 1;
      text-align: center;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 500;
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn-primary {
      background: #27ae60;
    }

    .btn-primary:hover {
      background: #219653;
    }

    .btn-secondary {
      background: #95a5a6;
    }

    .btn-secondary:hover {
      background: #7f8c8d;
    }

    @media (max-width: 500px) {
      .buttons {
        flex-direction: column;
      }
      .btn {
        width: 100%;
      }
    }

    footer {
      text-align: center;
      padding: 15px;
      color: #7f8c8d;
      font-size: 14px;
      background: #ecf0f1;
      border-top: 1px solid #bdc3c7;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Добавить новую запись</h1>
      <h4>(После успешного добавления данных вам об этом напишет тг бот)</h4>
    </header>

    <div class="form-container">
      <!-- Форма отправляется на /save методом POST -->
      <form action="/add-raspr" method="POST">

        <div class="form-group">
          <label for="name">Имя (Name)</label>
          <input type="text" id="name" name="name" placeholder="Введите имя" required />
        </div>

        <div class="form-group">
          <label for="chat_id">Chat ID</label>
          <input type="number" id="chat_id" name="chat_id" placeholder="Например: 123456789" required />
        </div>

        <div class="form-group">
          <label for="bot_id">Bot ID</label>
          <input type="text" id="bot_id" name="bot_id" placeholder="Например: bot123456:ABC" required />
        </div>

        <div class="buttons">
          <button type="submit" class="btn btn-primary">✅ Сохранить</button>
          <a href="/" class="btn btn-secondary">◀️ Отмена</a>
        </div>
      </form>
    </div>

  </div>
</body>
</html>
