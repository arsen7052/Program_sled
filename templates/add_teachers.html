<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Добавление преподавателя</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3a86ff;
      --primary-dark: #2573a6;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --bg: #f8fafd;
      --card-bg: #ffffff;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 8px 20px rgba(0, 0, 0, 0.12);
      --border-radius: 12px;
      --transition: all 0.3s ease;
      --error: #e74c3c;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background-color: var(--bg);
      margin: 0;
      padding: 20px;
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 30px;
      background-color: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
    }

    h1 {
      font-size: 1.8em;
      color: var(--text);
      margin: 0 0 24px 0;
      font-weight: 600;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text);
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 94%;
      padding: 12px 16px;
      font-size: 1em;
      border: 1px solid #ddd;
      border-radius: 8px;
      background-color: #f9f9f9;
      transition: var(--transition);
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.1);
    }

    input.invalid {
      border-color: var(--error);
      background-color: #fff9f9;
    }

    .form-footer {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      padding: 12px 24px;
      font-size: 1em;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .btn-secondary {
      background-color: #f1f5f9;
      color: var(--text);
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background-color: #e2e8f0;
    }

    .required {
      color: var(--error);
      font-weight: 600;
    }

    .login-link {
      display: block;
      text-align: center;
      margin-top: 30x;
      color: var(--text-light);
      font-size: 0.95em;
      text-decoration: none;
    }

    .login-link:hover {
      color: var(--primary);
    }

    .error {
      color: var(--error);
      font-size: 0.9em;
      margin-top: 4px;
      display: none;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Добавление преподавателя</h1>

    <form action="/add_teachers" method="POST" id="teacher-form">
      <div class="form-group">
        <label for="full_name">ФИО преподавателя <span class="required">*</span></label>
        <input 
          type="text" 
          id="full_name" 
          name="full_name" 
          placeholder="Иванов Иван Иванович" 
          required 
        />
      </div>

      <div class="form-group">
        <label for="login">Логин <span class="required">*</span></label>
        <input 
          type="text" 
          id="login" 
          name="login" 
          placeholder="ivanov123" 
          required 
        />
      </div>

      <div class="form-group">
        <label for="password">Пароль <span class="required">*</span></label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Минимум 4 символа" 
          minlength="4"
          required 
        />
        <div class="error" id="password-error">Пароли не совпадают</div>
      </div>

      <div class="form-group">
        <label for="password-confirm">Подтверждение пароля <span class="required">*</span></label>
        <input 
          type="password" 
          id="password-confirm" 
          name="password_confirm" 
          placeholder="Повторите пароль" 
          minlength="4"
          required 
        />
      </div>

      <div class="form-footer">
        <button type="submit" class="btn btn-primary">Добавить преподавателя</button>
      </div>
    </form>

    <a href="/" class="login-link">← На главную</a>
  </div>

  <script>
    const form = document.getElementById('teacher-form');
    const passwordInput = document.getElementById('password');
    const passwordConfirmInput = document.getElementById('password-confirm');
    const passwordError = document.getElementById('password-error');

    function validatePasswords() {
      const pwd = passwordInput.value;
      const pwd2 = passwordConfirmInput.value;

      if (pwd && pwd2 && pwd !== pwd2) {
        passwordInput.classList.add('invalid');
        passwordConfirmInput.classList.add('invalid');
        passwordError.classList.add('visible');
        return false;
      } else {
        passwordInput.classList.remove('invalid');
        passwordConfirmInput.classList.remove('invalid');
        passwordError.classList.remove('visible');
        return true;
      }
    }

    // Валидация при вводе
    passwordConfirmInput.addEventListener('input', validatePasswords);
    passwordInput.addEventListener('input', validatePasswords);

    // Валидация при отправке
    form.addEventListener('submit', function(e) {
      if (!validatePasswords()) {
        e.preventDefault();
        passwordConfirmInput.focus();
      }
    });
  </script>
</body>
</html>
