<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список кабинетов</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome для иконок -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007BFF;
            --primary-hover: #0056b3;
            --success-color: #28a745;
            --success-hover: #1e7e34;
            --danger-color: #dc3545;
            --danger-hover: #c82333;
            --text-dark: #333;
            --text-light: #555;
            --bg-light: #f4f4f4;
            --card-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2em;
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 4px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        .classroom-list {
            list-style: none;
            padding: 0;
            flex: 1;
        }

        .classroom-item {
            background: var(--card-bg);
            margin: 12px 0;
            padding: 18px 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            border-left: 5px solid var(--primary-color);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .classroom-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            border-left-color: var(--primary-hover);
        }

        .classroom-item a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 1.1em;
            font-weight: 500;
            flex: 1;
            transition: color 0.3s;
        }

        .classroom-item a:hover {
            color: var(--primary-color);
        }

        .classroom-item .icon {
            color: var(--primary-color);
            font-size: 1.3em;
            min-width: 30px;
            text-align: center;
        }

        /* Кнопка удаления */
        .btn-delete {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 1.1em;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            opacity: 0.7;
        }

        .btn-delete:hover {
            background-color: rgba(220, 53, 69, 0.1);
            color: var(--danger-color);
            opacity: 1;
            transform: scale(1.1);
        }

        .empty-message {
            text-align: center;
            color: var(--text-light);
            font-style: italic;
            padding: 30px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin: 20px 0;
        }

        /* Блок с кнопками внизу */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 500;
            font-size: 1em;
            text-decoration: none;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
        }

        .btn-success:hover {
            background-color: var(--success-hover);
            transform: translateY(-2px);
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            background-color: var(--danger-hover);
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .button-group {
                gap: 12px;
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }

            .classroom-item {
                padding: 15px;
            }

            .btn-delete {
                font-size: 1em;
                padding: 4px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Кабинеты</h1>
    </header>

    <!-- Список кабинетов -->
    <ul class="classroom-list">
        {% if classrooms %}
            {% for classroom in classrooms %}
                <li class="classroom-item">
                    <div class="icon">
                        <i class="fas fa-door-open"></i>
                    </div>
                    <a href="/filter/{{ classroom[0] }}">
                        {{ classroom[1] }}
                    </a>
                    <button class="btn-delete" onclick="confirmDelete({{ classroom[0] }})" title="Удалить кабинет">
                        <i class="fas fa-trash"></i>
                    </button>
                </li>
            {% endfor %}
        {% else %}
            <div class="empty-message">
                <i class="fas fa-building" style="font-size: 2em; color: #ccc; margin-bottom: 10px;"></i>
                <p>Кабинеты не найдены.</p>
            </div>
        {% endif %}
    </ul>

    <!-- Кнопки внизу страницы, по центру -->
    <div class="button-group">
        <a href="/new_classroom" class="btn btn-success">
            <i class="fas fa-plus-circle"></i> Добавить кабинет
        </a>
        <a href="/" class="btn btn-primary">
            <i class="fas fa-home"></i> На главную
        </a>
    </div>

    <script>
        function confirmDelete(classroomId) {
            if (confirm("Вы уверены, что хотите удалить этот кабинет? Это действие нельзя отменить.")) {
                window.location.href = "/delete_classroom/" + classroomId;
            }
        }
    </script>

</body>
</html>
