<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Выбор группы</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3a86ff;
      --primary-dark: #2573a6;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --bg: #f8fafd;
      --card-bg: #ffffff;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 8px 20px rgba(0, 0, 0, 0.12);
      --border-radius: 12px;
      --transition: all 0.3s ease;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background-color: var(--bg);
      margin: 0;
      padding: 20px;
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 1.8em;
      color: var(--text);
      margin: 0 0 30px 0;
      font-weight: 600;
      text-align: center;
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .group-button {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      font-size: 1.05em;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: var(--border-radius);
      text-decoration: none;
      transition: var(--transition);
      box-shadow: var(--shadow);
      min-height: 60px;
    }

    .group-button:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      background: linear-gradient(135deg, #3070e0, var(--primary-dark));
    }

    .group-button:active {
      transform: translateY(0);
    }

    .action-buttons {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .back-button, .add-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      font-size: 1em;
      font-weight: 500;
      color: var(--text);
      background-color: #f1f5f9;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      transition: var(--transition);
    }

    .add-button {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
    }

    .add-button:hover {
      background: linear-gradient(135deg, #3070e0, var(--primary-dark));
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .back-button:hover {
      background-color: #e2e8f0;
      border-color: #cbd5e1;
    }

    .icon {
      font-size: 1.2em;
    }

    .no-groups {
      text-align: center;
      color: var(--text-light);
      font-style: italic;
      padding: 30px;
      background-color: #f8f9fa;
      border-radius: var(--border-radius);
      border: 1px dashed #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Заголовок -->
    <h1>📚 Выберите нужную группу</h1>

    <!-- Кнопки действий -->
    <div class="action-buttons">
      <a href="/" class="back-button">
        ← Назад в меню
      </a>
      {% if admin %}
      <a href="/add-group" class="add-button">
        ➕ Добавить группу
      </a>
      {% endif %}
    </div>

    <!-- Сетка с группами -->
    <div class="groups-grid">
      {% if groups %}
        {% for group in groups %}
          <a href="/group/{{ group[0] }}" class="group-button">
            {{ group[1] }}
          </a>
        {% endfor %}
      {% else %}
        <div class="no-groups">Нет доступных групп</div>
      {% endif %}
    </div>
  </div>
</body>
</html>
